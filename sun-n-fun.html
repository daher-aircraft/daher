<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daher - Sun N' Fun Registration</title>
    <style>
        /* Fonts */
        @font-face {
            font-family: 'Knockout';
            src: url('fonts/Knockout/Knockout-HTF51-Middleweight.otf') format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Knockout';
            src: url('fonts/Knockout/Knockout-HTF31-JuniorMiddlewt.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Knockout';
            src: url('fonts/Knockout/Knockout-HTF32-JuniorCruiserwt.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }
        @font-face {
            font-family: 'Forza';
            src: url('fonts/Forza/Forza-Medium.woff') format('woff'),
                 url('fonts/Forza/Forza-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Forza';
            src: url('fonts/Forza/Forza-Book.woff') format('woff'),
                 url('fonts/Forza/Forza-Book.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Forza';
            src: url('fonts/Forza/Forza-Light.woff') format('woff'),
                 url('fonts/Forza/Forza-Light.ttf') format('truetype');
            font-weight: 300;
            font-style: normal;
        }
        @font-face {
            font-family: 'Forza';
            src: url('fonts/Forza/Forza-Bold.woff') format('woff'),
                 url('fonts/Forza/Forza-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Forza';
            src: url('fonts/Forza/Forza-Black.woff') format('woff'),
                 url('fonts/Forza/Forza-Black.ttf') format('truetype');
            font-weight: 900;
            font-style: normal;
        }

        /* Reset & Base */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Forza', Arial, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Card Container */
        .card {
            max-width: 720px;
            margin: 40px auto;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* Banner */
        .banner {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Info Section */
        .info-section {
            background: #111111;
            padding: 32px 40px 24px;
            text-align: center;
        }

        .event-badge {
            display: inline-block;
            font-family: 'Forza', Arial, sans-serif;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 6px 20px;
            margin-bottom: 20px;
        }

        .main-title {
            font-family: 'Knockout', 'Arial Black', sans-serif;
            font-weight: 500;
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.1;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: 'Forza', Arial, sans-serif;
            font-weight: 300;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
            margin-top: 12px;
        }

        .button.red, a.button.red {
            background-color: #E60032 !important;
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #e63312, #ff6b4a);
            margin: 20px auto 0;
            border-radius: 2px;
        }

        /* Form Section */
        .form-section {
            padding: 24px 40px 0;
            background: #1a1a1a;
        }

        .iframe-wrapper {
            max-width: 460px;
            margin: 0 auto;
            overflow: hidden;
            background: #ffffff;
            border-radius: 8px;
            padding-left: 24px;
        }

        .iframe-wrapper iframe {
            width: 460px;
            height: 800px;
            border: none;
            display: block;
            overflow: hidden;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px 40px 32px;
            background: #1a1a1a;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .footer p {
            font-family: 'Forza', Arial, sans-serif;
            font-weight: 300;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #ffffff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card {
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }

            .info-section {
                padding: 24px 24px 20px;
            }

            .main-title {
                font-size: 32px;
            }

            .event-badge {
                font-size: 10px;
                letter-spacing: 2px;
                padding: 5px 16px;
            }

            .form-section {
                padding: 16px 0 0;
            }

            .footer {
                padding: 16px 20px 24px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 26px;
            }

            .subtitle {
                font-size: 13px;
            }

            .form-section {
                padding: 8px 0 0;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Banner Image -->
        <div class="banner">
            <img src="img/TBM & Kodiak_Banner_Your personal invitation_Sun n Fun.jpg" alt="Daher - Your Personal Invitation - Sun N' Fun">
        </div>

        <!-- Event Info -->
        <div class="info-section">
            <div class="event-badge">Sun N' Fun &bull; April 14, 19 &bull; Lakeland, Florida</div>
            <h1 class="main-title">Complete Your Sun N' Fun<br>Registration</h1>
            <p class="subtitle">Fill out the form below to secure your spot at the Daher exhibit.</p>
            <div class="divider"></div>
        </div>

        <!-- Iframe Form -->
        <div class="form-section">
            <div class="iframe-wrapper">
                <iframe
                    id="evenium-form"
                    src="https://evenium.events/pro/fiche/quest.jsp;jsessionid=8JVHuCeB-vubhiBnZlEtx5gy.45.82?surveyName=Fiche&from=js&_TIM_=R48009262"
                    title="Sun N' Fun Registration Form"
                    scrolling="no"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope">
                </iframe>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2026 Daher &mdash; <a href="https://www.daher.com" target="_blank" rel="noopener">daher.com</a></p>
        </div>
    </div>

</body>
</html>
